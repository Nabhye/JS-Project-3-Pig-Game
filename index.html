<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <link rel="stylesheet" href="style.css" />
    <title>Pig Game</title>
  </head>
  <body>
    <main>
      <section class="player player--0 player--active">
        <h2 class="name" id="name--0">Player 1</h2>
        <p class="score" id="score--0">43</p>
        <div class="current">
          <p class="current-label">Current</p>
          <p class="current-score" id="current--0">0</p>
        </div>
      </section>

      <section class="player player--1">
        <h2 class="name" id="name--1">Player 2</h2>
        <p class="score" id="score--1">24</p>
        <div class="current">
          <p class="current-label">Current</p>
          <p class="current-score" id="current--1">0</p>
        </div>
      </section>

      <img src="dice-5.png" alt="Dice" class="dice" />
      <button class="btn btn--new">🔄 New game</button>
      <button class="btn btn--roll">🎲 Roll dice</button>
      <button class="btn btn--hold">📥 Hold</button>
    </main>

    <!-- Rules modal + backdrop -->
    <div class="backdrop hidden" id="backdrop"></div>
    <div class="rules hidden" id="rules" role="dialog" aria-labelledby="rules-title">
      <h3 id="rules-title">Game Rules</h3>
      <p>Roll the dice and add to your current score. If you roll a <strong>1</strong>, you lose your current score and it's the next player's turn.</p>
      <p>You can click <strong>Hold</strong> to add your current score to your total. First to reach <strong>100</strong> points wins.</p>
      <div style="display:flex;justify-content:center;margin-top:1.2rem;">
        <button class="btn btn--start" id="btn--start">Start Game</button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
